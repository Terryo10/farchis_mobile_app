name: farchis_app
description: "Farchis Automotive - Premium vehicle maintenance and service app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  skeletonizer: ^2.1.3

  cupertino_icons: ^1.0.8
  google_fonts: ^8.1.0

  flutter_bloc: ^9.1.1
  bloc: ^9.2.1
  equatable: ^2.0.8

  json_annotation: ^4.9.0
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.0
  firebase_analytics: ^12.4.3
  firebase_crashlytics: ^5.2.4

  shared_preferences: ^2.5.5
  flutter_secure_storage: ^10.3.1
  sqflite: ^2.4.2+1
  cached_network_image: ^3.4.1

  flutter_local_notifications: ^22.0.1

  connectivity_plus: ^7.1.1
  lottie: ^3.3.3
  fl_chart: ^1.2.0
  pinput: ^6.0.2

  image_picker: ^1.2.2

  google_maps_flutter: ^2.17.1
  geolocator: ^14.0.3

  intl: ^0.20.2
  permission_handler: ^12.0.3
  url_launcher: ^6.3.2
  share_plus: ^13.1.0
  google_sign_in: ^6.2.2
  firebase_auth: ^6.5.3
  http: ^1.6.0
  auto_route: ^11.1.0
  flutter_native_splash: ^2.4.8
  flutter_launcher_icons: ^0.14.4
  flutter_stripe: ^13.0.0
  pusher_channels_flutter: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  build_runner: ^2.5.4
  json_serializable: ^6.9.5
  auto_route_generator: ^10.6.0
flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"

flutter_native_splash:
  color: "#ffffff"
  image: "assets/images/logo.png"
  android_12:
    image: "assets/images/logo.png"
    icon_background_color: "#ffffff"
